name: CI Coverage
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  flip-coverage:
    runs-on: ubuntu-slim

    name: ${{ github.actor }} checks code coverage
    steps:
      - name: CHECKOUT!
        uses: actions/checkout@v6
      
      - name: Install node # installs node
        uses: actions/setup-node@v6
        with:
          node-version: '22.17.0'
          cache: "npm"
          cache-dependency-path: '**/package.json'

      - name: Install node modules # npm ci
        run: npm install

      - name: Generate coverage report
        run: npm run test:coverage
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7